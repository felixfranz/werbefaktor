name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Configure known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts  
      
      - name: Sync changed files
        run: |
          lftp -u "${{ secrets.USERNAME }},${{ secrets.PASSWORD }}" sftp://${{ secrets.HOST }}:${{ secrets.PORT }} <<EOF
          mirror -R \
            --verbose \
            ./ \
            ${{ secrets.REMOTE_PATH }}
          quit
          EOF
